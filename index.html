<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolchoseth</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Playfair Display', serif;
            overflow-x: hidden; /* Prevents side-scrolling */
        }

        .card {
            padding: 20px; /* Reduced padding for mobile */
            border: 1px solid #1a1a1a;
            border-radius: 15px;
            background: #050505;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 90vw; /* Keeps the card within the screen width */
            text-align: center;
        }

        h1 {
            color: #007FFF; 
            /* Fluid typography: minimum 3rem, scales with width, max 8rem */
            font-size: clamp(3rem, 15vw, 8rem); 
            margin: 0;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(0, 127, 255, 0.3);
            white-space: nowrap; /* Keeps the name on one line */
        }

        /* Desktop Adjustment */
        @media (min-width: 768px) {
            .card {
                padding: 40px 80px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Bolchoseth</h1>
    </div>
</body>
</html>
