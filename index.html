<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolchoseth</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Playfair Display', serif;
        }

        .card {
            padding: 40px 80px;
            border: 1px solid #1a1a1a;
            border-radius: 15px;
            background: #050505;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #007FFF; /* Bright Azure */
            font-size: 8rem;
            margin: 0;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(0, 127, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Bolchoseth</h1>
    </div>
</body>
</html>
